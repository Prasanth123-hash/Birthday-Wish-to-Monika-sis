<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Best Sister Greeting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      min-height: 100vh;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      font-family: 'Segoe UI', 'Pacifico', cursive, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: bgMove 6s ease-in-out infinite;
    }

    @keyframes bgMove {
      0% {background-position: 0 0;}
      100% {background-position: 100vw 100vh;}
    }

    .card {
      background: rgba(255,255,255,0.85);
      padding: 40px 30px 30px 30px;
      border-radius: 24px;
      box-shadow: 0 12px 36px rgba(184,77,157,0.12);
      text-align: center;
      max-width: 420px;
    }
    h1 {
      font-family: 'Pacifico', cursive;
      color: #bd52a9;
      font-size: 2.7em;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .message {
      color: #4D1569;
      font-size: 1.2em;
      margin-bottom: 25px;
      line-height: 1.6;
    }
    .heart {
      width: 60px;
      margin-bottom: 18px;
      animation: beat 1s infinite alternate;
    }
    @keyframes beat {
      to {transform: scale(1.2);}
    }
    .signature {
      color: #bd52a9;
      font-size: 1.05em;
      margin-top: 20px;
      font-style: italic;
      letter-spacing: 1px;
    }
    .confetti {
      position: absolute;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      top: 0; left: 0;
      z-index: 0;
    }
  </style>
</head>
<body>
  <canvas class="confetti"></canvas>
  <div class="card">
    <!-- <img class="heart" src="https://cdn.pixabay.com/photo/2016/03/31/19/08/heart-1298952_1280.png" alt="Heart"/> -->
    <h1>Happy Birthday, Sister!</h1>
    <div class="message">
      You are the sunshine in my life, the laughter in my days, and the sparkle in my memories.<br>
      Wishing you a wonderful year ahead filled with joy, adventure, and love.<br>
      You're not just my sister, but my best friend!
    </div>
    <div class="signature">
      With lots of love,<br>
      Prasanth
    </div>
  </div>
  <script>
    // Simple confetti animation for celebration
    const canvas = document.querySelector('.confetti');
    const ctx = canvas.getContext('2d');
    let confettiPieces = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    for (let i = 0; i < 60; i++) {
      confettiPieces.push({
        x: randomBetween(0, canvas.width),
        y: randomBetween(-canvas.height, canvas.height),
        r: randomBetween(8, 24),
        color: `hsl(${randomBetween(330, 360)}, 75%, 80%)`,
        speed: randomBetween(1, 3)
      });
    }

    function drawConfetti() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for (const c of confettiPieces) {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, 2*Math.PI);
        ctx.fillStyle = c.color;
        ctx.fill();
        c.y += c.speed;
        if (c.y - c.r > canvas.height) {
          c.y = randomBetween(-canvas.height, 0);
          c.x = randomBetween(0, canvas.width);
          c.speed = randomBetween(1, 2.8);
        }
      }
      requestAnimationFrame(drawConfetti);
    }
    drawConfetti();
  </script>
</body>
</html>
